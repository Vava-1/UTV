# render.yaml
services:
  # 1. The PostgreSQL Database
  - type: pgo
    name: utv-database
    plan: free # Change to a paid plan later if you need more capacity
    region: ohio

  # 2. The FastAPI Backend
  - type: web
    name: utv-backend
    env: python
    region: ohio
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: utv-database
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false # You will enter this manually in the dashboard
      - key: STRIPE_SECRET_KEY
        sync: false # You will enter this manually in the dashboard
      - key: AWS_ACCESS_KEY_ID
        sync: false # You will enter this manually in the dashboard
      - key: AWS_SECRET_ACCESS_KEY
        sync: false # You will enter this manually in the dashboard
