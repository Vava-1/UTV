services:
  # 2. The FastAPI Backend
  - type: web
    name: utv-backend
    env: python
    region: ohio
    plan: free
    # Look at the two lines below - we added utv-platform/
    buildCommand: "pip install -r utv-platform/backend/requirements.txt"
    startCommand: "cd utv-platform/backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: utv-database
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
