databases:
  - name: utv-database
    plan: free
    databaseName: utv_db

services:
  - type: web
    name: utv-backend
    env: python
    region: ohio
    plan: free
    rootDir: utv-platform/backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: utv-database
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://utv-frontend.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false

  - type: web
    name: utv-frontend
    runtime: static
    rootDir: utv-platform/frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://utv-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
